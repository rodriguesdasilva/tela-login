<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    <main class="container">
        <div class="circulo">

        </div>
        <h1>Crie sua conta</h1>
        <p class="paragrafo">Comece gratuitamente, sem cartão de crédito</p>
        <div class="title-main">
            <div class="content-main">
                <div class="tebela-login">

                    <div class="login">
                        <label>Nome completo</label>
                        <div class="input-usuario">
                            <img width="20" height="20"
                                src="https://img.icons8.com/ios-glyphs/20/ffffff/gender-neutral-user.png"
                                alt="gender-neutral-user" />
                            <input type="text" placeholder="Seu nome">
                        </div>
                    </div>


                    <div class="login">
                        <label>Email</label>
                        <div class="input-usuario">
                            <img width="20" height="20"
                                src="https://img.icons8.com/external-smashingstocks-glyph-smashing-stocks/20/ffffff/external-emails-shopping-and-commerce-smashingstocks-glyph-smashing-stocks.png"
                                alt="external-emails-shopping-and-commerce-smashingstocks-glyph-smashing-stocks" />
                            <input id="emailNovo" type="email" placeholder="seu@gmail.com" required>
                        </div>
                    </div>

                    <div class="senha">
                        <label>Senha</label>
                        <div class="senha-usuario">
                            <div class="infos">
                                <img class="cadeado" width="20" height="20"
                                    src="https://img.icons8.com/ios-glyphs/20/ffffff/lock--v1.png" alt="lock--v1" />
                                <input id="senhaNova" type="password" class="inputSenha" placeholder="senha" required>
                                <img class="olho" width="20" height="20" src="./img/olhofechado.png"
                                    onclick="eventoSenha()" />

                            </div>
                        </div>
                    </div>
                    <div class="button-content">
                        <button class="btn-entra" onclick="criarNovoUsuario()">Criar conta</button>
                        <p class="btn-paragrafo">ou continue com</p>
                    </div>
                    <div class="buttons">
                        <div class="img-rede">
                            <button>
                                <div class="logo-img">
                                    <img width="15" height="15"
                                        src="https://img.icons8.com/ios-glyphs/15/ffffff/google-logo--v1.png"
                                        alt="google-logo--v1" />
                                    Google
                                </div>
                            </button>
                            <button>
                                <div class="logo-img">
                                    <img width="15" height="15"
                                        src="https://img.icons8.com/material-outlined/15/ffffff/mac-os--v2.png"
                                        alt="mac-os--v2" />
                                    Apple
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="cadastro">
            <p>Já tem uma conta? <span class="destaque-paragrafo"><a href="index.html" target="_blank"> Faça
                        login</a></span></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
