<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    <main class="container">
        <div class="circulo">
    
        </div>
        <div class="logo-star">
            <img width="30" height="30" src="https://img.icons8.com/material-outlined/30/5345ED/sparkles.png" />
        </div>
        <h1>Bem-vindo de volta</h1>
        <p class="paragrafo">Entre para continuar sua jornada</p>
        <div class="title-main">
            <div class="content-main">
                <div class="tebela-login">

                    <div class="login">
                        <label>Email</label>
                        <div class="input-usuario">
                            <img width="20" height="20"
                                src="https://img.icons8.com/external-smashingstocks-glyph-smashing-stocks/20/ffffff/external-emails-shopping-and-commerce-smashingstocks-glyph-smashing-stocks.png"
                                alt="external-emails-shopping-and-commerce-smashingstocks-glyph-smashing-stocks" />
                            <input type="email" placeholder="seu@gmail.com">
                        </div>
                    </div>

                    <div class="senha">
                        <label>Senha</label>
                        <div class="senha-usuario">
                            <div class="infos">
                                <img class="cadeado" width="20" height="20"
                                    src="https://img.icons8.com/ios-glyphs/20/ffffff/lock--v1.png" alt="lock--v1" />
                                <input type="password">
                                <img class="olho" width="20" height="20"
                                    src="https://img.icons8.com/external-line-icons-royyan-wijaya/30/ffffff/external-eyes-medical-stuff-line-icons-royyan-wijaya.png"
                                    alt="external-eyes-medical-stuff-line-icons-royyan-wijaya" />
                                <span>
                                    <p>Esqueceu a senha?</p>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="button-content">
                        <button class="btn-entra">Entrar</button>
                        <p class="btn-paragrafo">ou continue com</p>
                    </div>
                    <div class="buttons">
                        <div class="img-rede">
                            <button>
                                <div class="logo-img">
                                    <img width="15" height="15"
                                        src="https://img.icons8.com/ios-glyphs/15/ffffff/google-logo--v1.png"
                                        alt="google-logo--v1" />
                                    Google
                                </div>
                            </button>
                            <button>
                                <div class="logo-img">
                                    <img width="15" height="15"
                                        src="https://img.icons8.com/material-outlined/15/ffffff/mac-os--v2.png"
                                        alt="mac-os--v2" />
                                    Apple
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="cadastro">
            <p>Não tem uma conta? <span class="destaque-paragrafo">Cadastre-se</span></p>
        </div>
    </main>
</body>

</html>
