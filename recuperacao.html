<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    <main class="container">
        <div class="circulo">

        </div>
        <div class="title-main">
            <h2>Recuperar senha</h2>
            <p class="paragrafo">Informe seu email e enviaremos um link para redefinir sua senha.</p>
            <div class="content-main">
                <div class="tebela-login">

                    <div class="login">
                        <label>Email</label>
                        <div class="input-usuario">
                            <img width="20" height="20"
                                src="https://img.icons8.com/external-smashingstocks-glyph-smashing-stocks/20/ffffff/external-emails-shopping-and-commerce-smashingstocks-glyph-smashing-stocks.png"
                                alt="external-emails-shopping-and-commerce-smashingstocks-glyph-smashing-stocks" />
                            <input class="input-recu" type="email" placeholder="seu@gmail.com">
                        </div>
                    </div>

                    <div class="button-content">
                        <button class="btn-entra">Enviar link de recuperação</button>
                        <p class="btn-paragrafo"><a href="index.html" target="_blank">Voltar ao login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
